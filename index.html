<!DOCTYPE html>
<html>
  <style>
body {
    /* font-family: Trebuchet MS, sans-serif; */
    font-family: EB Garamond, sans-serif;
    margin: 0;
    background-color: #E7D5BE;
    color: #E7D5BE;
    background-image: url("./images/background.jpg");
}


/* Hlavička */
header {
    background-color: #919363;
    color: #614124;
    padding: 24px;
    text-align: center;
    border-bottom: 4px solid #614124;
}

/* Nadpisy */
h1 {
    margin: 0;
    font-size: 60px;
    color: #919363;
    text-align: center;
}

h2 {
    font-size: 40px;
    color: #614124;
}

h3 {
    font-size: 30px;
    color: #614124;
}

h4 {
    font-size: 25px;
    color: #614124;
    margin-bottom: 2px;
}

label {
    color: #614124;
    font-weight: bold;
}

/* Obsah */
main {
    padding: 25px;
    max-width: 900px;
    margin: auto;
}

/* Sekcia – ice olive štýl */
section {
    background-color: #B490A9;
    padding: 22px;
    margin-top: 28px;
    border-radius: 14px;
    border-left: 6px solid #614124;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

/* jemný hover efekt */
section:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 26px rgba(0,0,0,0.08);
}

/* Pätička */
footer {
    text-align: center;
    padding: 12px;
    margin-top: 40px;
    background-color: #919363;
    border-top: 3px solid #614124;
    color: #614124;
}

hr {
    width:110px;
    height:2px;
    border-width:0;
    color: #614124;
    background-color:#614124;
}

.row {
  display: flex;
}

.column {
  flex: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
<head>
<meta charset="UTF-8">
<title>Srnkovci</title>
</head>
<body>
    <link rel="stylesheet" 
    href="https://fonts.googleapis.com/css2?family=Gilda+Display:wght@100;400&family=EB+Garamond:wght@400&display=swap" 
    media="all">

    <main>
        <h1>MIRIAM & LUKÁŠ</h1>

        <div class="row">
            <div class="column">
                <div>
                <h2>12. septembra 2026</h2>
                <h2>o 13:30</h2>
                <h2>v Kostole sv. Štefana Uhorského, Bratislava</h2>
                </div>
            </div>
            <div class="column" style="flex:10%"></div>
            <div class="column">
                <img src="./images/my.png" 
                style="width: 100%;">
            </div>
        </div>

        <h2>Bude svadbaaa</h2>
        <section>
        V Abelande
        </section>

        <h2>Ako sa obliect</h2>
        <section>
        Tepluckooo
        </section>

        <h2>Ako sa dostat</h2>
        <section>
            Lozorno
        </section>

  </main>

  <footer>
    <h2 style="color: #614124;margin-bottom: 0;">M&L</h2>
    <hr>
    <h4 style="margin-top: 0;">12.9.2026</h4>
  </footer>

</body>
</html>
